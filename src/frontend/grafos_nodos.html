<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grafo de Relaciones · Portal Anticorrupción JGM</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.9/vis-network.min.js"></script>
<style>
:root {
  --bg:#0f1117; --surface:#1a1d27; --card:#21253a;
  --border:#2e3250; --text:#e2e8f0; --muted:#8892a4;
  --accent:#4f8ef7; --alta:#f05252; --media:#f59e0b; --baja:#10b981;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; overflow: hidden; }

header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 12px 24px; display: flex; align-items: center; gap: 12px;
}
header h1 { font-size: 15px; font-weight: 600; }
nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; gap: 4px; }
nav a { color: var(--muted); text-decoration: none; padding: 8px 14px; font-size: 13px; border-bottom: 2px solid transparent; }
nav a.active { color: var(--text); border-bottom-color: var(--accent); }
nav a:hover { color: var(--text); }

.layout { display: flex; height: calc(100vh - 86px); }

/* Panel izquierdo */
.sidebar {
  width: 280px; min-width: 280px;
  background: var(--surface); border-right: 1px solid var(--border);
  overflow-y: auto; padding: 16px;
}
.sidebar h2 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 12px; }

.leyenda-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; }
.dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.dot.funcionario { background: #4f8ef7; }
.dot.proveedor   { background: #10b981; }
.linea { width: 24px; height: 3px; flex-shrink: 0; border-radius: 2px; }
.linea.parentesco { background: var(--alta); }
.linea.societario { background: var(--media); }
.linea.fondos     { background: #a78bfa; }

.filtros-grafo { margin-top: 20px; }
.filtros-grafo label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; margin-top: 10px; }
.filtros-grafo select, .filtros-grafo input {
  width: 100%; background: var(--card); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px; padding: 5px 8px; font-size: 12px; outline: none;
}

.stats-grafo { margin-top: 20px; }
.stat-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.stat-row:last-child { border-bottom: none; }
.stat-val { font-weight: 600; color: var(--accent); }

/* Panel detalle (al hacer click en nodo) */
.detalle {
  margin-top: 20px; background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px; display: none;
}
.detalle.visible { display: block; }
.detalle h3 { font-size: 12px; font-weight: 600; margin-bottom: 8px; }
.detalle p  { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.detalle strong { color: var(--text); }

/* Canvas grafo */
#grafo-canvas { flex: 1; background: var(--bg); }

.loading-overlay {
  position: absolute; top: 0; left: 280px; right: 0; bottom: 0;
  background: var(--bg); display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; font-size: 13px; color: var(--muted);
}
.spinner-ring {
  width: 36px; height: 36px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4f8ef7" stroke-width="2">
    <circle cx="12" cy="5" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/>
    <line x1="12" y1="7" x2="5" y2="17"/><line x1="12" y1="7" x2="19" y2="17"/>
  </svg>
  <h1>Grafo de relaciones · JGM</h1>
</header>
<nav>
  <a href="dashboard.html">Dashboard</a>
  <a href="grafo_nodos.html" class="active">Grafo de relaciones</a>
  <a href="alertas.html">Alertas</a>
</nav>

<div class="layout" style="position:relative">
  <div class="sidebar">
    <h2>Leyenda</h2>
    <div class="leyenda-item"><div class="dot funcionario"></div> Funcionario JGM</div>
    <div class="leyenda-item"><div class="dot proveedor"></div> Proveedor del Estado</div>
    <div style="margin-top:10px"></div>
    <div class="leyenda-item"><div class="linea parentesco"></div> Vínculo de parentesco</div>
    <div class="leyenda-item"><div class="linea societario"></div> Vínculo societario</div>
    <div class="leyenda-item"><div class="linea fondos"></div> Flujo de fondos</div>

    <div class="filtros-grafo">
      <h2 style="margin-top:16px">Filtros</h2>
      <label>Tipo de vínculo</label>
      <select id="f-tipo" onchange="filtrarGrafo()">
        <option value="">Todos</option>
        <option value="parentesco">Parentesco</option>
        <option value="societario">Societario</option>
        <option value="fondos">Fondos</option>
      </select>
      <label>Nivel de alerta</label>
      <select id="f-nivel" onchange="filtrarGrafo()">
        <option value="">Todos</option>
        <option value="alta">Alta</option>
        <option value="media">Media</option>
        <option value="baja">Baja</option>
      </select>
      <label>Buscar nodo</label>
      <input id="f-buscar" placeholder="Nombre o CUIT…" oninput="buscarNodo(this.value)"/>
    </div>

    <div class="stats-grafo">
      <h2 style="margin-top:16px">Estadísticas</h2>
      <div class="stat-row"><span>Nodos</span><span class="stat-val" id="s-nodos">—</span></div>
      <div class="stat-row"><span>Aristas</span><span class="stat-val" id="s-aristas">—</span></div>
      <div class="stat-row"><span>Alertas alta</span><span class="stat-val" id="s-alta" style="color:var(--alta)">—</span></div>
    </div>

    <div class="detalle" id="detalle-nodo">
      <h3 id="det-titulo">Nodo seleccionado</h3>
      <p><strong id="det-tipo"></strong></p>
      <p id="det-id"></p>
      <p id="det-conexiones"></p>
    </div>
  </div>

  <div id="grafo-canvas"></div>

  <div class="loading-overlay" id="loading">
    <div class="spinner-ring"></div>
    <span>Cargando grafo de relaciones…</span>
  </div>
</div>

<script>
const API = '';
let network, todosNodos, todosEdges;

const COLOR_NODE = {
  funcionario: { background: '#1e3a5f', border: '#4f8ef7', highlight: { background: '#2d5496', border: '#7ab3ff' } },
  proveedor:   { background: '#0d3325', border: '#10b981', highlight: { background: '#1a5c42', border: '#34d399' } },
};
const COLOR_EDGE = {
  parentesco: '#f05252',
  societario: '#f59e0b',
  fondos:     '#a78bfa',
};

async function iniciarGrafo() {
  const data = await fetch(API + '/api/v1/grafo/nodos').then(r => r.json()).catch(() => null);
  document.getElementById('loading').style.display = 'none';

  if (!data || !data.nodes.length) {
    document.getElementById('grafo-canvas').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#8892a4;font-size:13px">' +
      'Sin datos de vínculos aún. Ejecutá los scrapers y el motor de cruce.</div>';
    return;
  }

  todosNodos = data.nodes;
  todosEdges = data.edges;

  document.getElementById('s-nodos').textContent   = data.nodes.length;
  document.getElementById('s-aristas').textContent = data.edges.length;
  document.getElementById('s-alta').textContent    = data.edges.filter(e => e.nivel === 'alta').length;

  renderGrafo(data.nodes, data.edges);
}

function renderGrafo(nodes, edges) {
  const visNodes = new vis.DataSet(nodes.map(n => ({
    id: n.id,
    label: n.label,
    title: n.title || n.id,
    group: n.grupo,
    color: COLOR_NODE[n.grupo] || COLOR_NODE.funcionario,
    font: { color: '#e2e8f0', size: 11 },
    size: n.grupo === 'funcionario' ? 18 : 14,
  })));

  const visEdges = new vis.DataSet(edges.map((e, i) => ({
    id: i,
    from: e.from,
    to: e.to,
    color: { color: COLOR_EDGE[e.type] || '#8892a4', opacity: e.nivel === 'alta' ? 1 : 0.5 },
    width: e.nivel === 'alta' ? 2.5 : 1,
    dashes: e.nivel !== 'alta',
    title: `${e.type} · ${e.nivel}`,
    arrows: { to: { enabled: true, scaleFactor: 0.5 } },
  })));

  const container = document.getElementById('grafo-canvas');
  network = new vis.Network(container, { nodes: visNodes, edges: visEdges }, {
    physics: {
      stabilization: { iterations: 150 },
      barnesHut: { gravitationalConstant: -8000, springLength: 120, damping: 0.3 },
    },
    interaction: { hover: true, tooltipDelay: 200, navigationButtons: false },
    layout: { improvedLayout: true },
  });

  network.on('click', params => {
    if (!params.nodes.length) return;
    const id = params.nodes[0];
    const nodo = todosNodos.find(n => n.id === id);
    const conexiones = todosEdges.filter(e => e.from === id || e.to === id).length;

    const det = document.getElementById('detalle-nodo');
    det.classList.add('visible');
    document.getElementById('det-titulo').textContent = nodo.label;
    document.getElementById('det-tipo').textContent   = nodo.grupo === 'funcionario' ? '🔵 Funcionario JGM' : '🟢 Proveedor';
    document.getElementById('det-id').innerHTML       = `<strong>ID/CUIT:</strong> ${nodo.id}`;
    document.getElementById('det-conexiones').innerHTML = `<strong>Vínculos:</strong> ${conexiones}`;
  });
}

function filtrarGrafo() {
  if (!todosNodos) return;
  const tipo  = document.getElementById('f-tipo').value;
  const nivel = document.getElementById('f-nivel').value;

  let edges = todosEdges;
  if (tipo)  edges = edges.filter(e => e.type  === tipo);
  if (nivel) edges = edges.filter(e => e.nivel === nivel);

  // Solo mostrar nodos conectados por las aristas filtradas
  const ids = new Set(edges.flatMap(e => [e.from, e.to]));
  const nodes = tipo || nivel ? todosNodos.filter(n => ids.has(n.id)) : todosNodos;

  renderGrafo(nodes, edges);
}

function buscarNodo(q) {
  if (!network || !q) return;
  const nodo = todosNodos.find(n =>
    n.label.toLowerCase().includes(q.toLowerCase()) || n.id.includes(q)
  );
  if (nodo) {
    network.focus(nodo.id, { scale: 1.5, animation: { duration: 500 } });
    network.selectNodes([nodo.id]);
  }
}

iniciarGrafo();
</script>
</body>
</html>
