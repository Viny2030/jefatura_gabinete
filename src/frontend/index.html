<!DOCTYPE html>
<html>
<head>
    <title>Grafo de Relaciones - Jefatura de Gabinete</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        .node { stroke: #fff; stroke-width: 1.5px; }
        .link { stroke-opacity: 0.6; stroke-width: 2px; }
        text { font: 12px sans-serif; pointer-events: none; }
    </style>
</head>
<body>
    <h2 style="text-align:center">Mapa de Vínculos: Sector Público vs Privado</h2>
    <svg width="800" height="600"></svg>
    <script>
        const data = {
            nodes: [
                { id: "Juan Pérez", type: "Funcionario", color: "blue" },
                { id: "Ana López", type: "Funcionario", color: "blue" },
                { id: "Ricardo Gómez", type: "Familiar", color: "red" },
                { id: "Carlos López", type: "Familiar", color: "red" },
                { id: "Tech Soluciones SA", type: "Empresa", color: "green" }
            ],
            links: [
                { source: "Juan Pérez", target: "Ricardo Gómez", color: "red", label: "Cuñado" },
                { source: "Ricardo Gómez", target: "Tech Soluciones SA", color: "orange", label: "Presidente" },
                { source: "Ana López", target: "Carlos López", color: "red", label: "Hijo" }
            ]
        };

        const svg = d3.select("svg"), width = +svg.attr("width"), height = +svg.attr("height");
        const simulation = d3.forceSimulation(data.nodes)
            .force("link", d3.forceLink(data.links).id(d => d.id).distance(150))
            .force("charge", d3.forceManyBody().strength(-300))
            .force("center", d3.forceCenter(width / 2, height / 2));

        const link = svg.append("g").selectAll("line")
            .data(data.links).enter().append("line")
            .attr("class", "link")
            .attr("stroke", d => d.color);

        const node = svg.append("g").selectAll("circle")
            .data(data.nodes).enter().append("circle")
            .attr("class", "node")
            .attr("r", 10)
            .attr("fill", d => d.color);

        node.append("title").text(d => d.id);
        simulation.on("tick", () => {
            link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
            node.attr("cx", d => d.x).attr("cy", d => d.y);
        });
    </script>
</body>
</html>
