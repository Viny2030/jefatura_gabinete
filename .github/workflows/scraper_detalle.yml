name: Scraper Detalle Contratos — Nocturno (JGM + SGP + Presidencia)

on:
  schedule:
    - cron: "0 4 * * *"    # 01:00 ART = 04:00 UTC
  workflow_dispatch:

jobs:
  scrape-detalle:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      # Modo CSV: no requiere PostgreSQL. Cruza monto/CUIT/razon social de cada
      # proceso adjudicado (JGM, SGP y Presidencia) usando el SAF correcto por
      # prefijo de NUP. Reintenta ante 503 intermitentes de comprar.gob.ar.
      - name: Correr scraper de detalle (multi-area)
        continue-on-error: true
        run: |
          for i in 1 2 3; do
            echo "Intento $i de 3..."
            python scripts/scraper_detalle_contratos.py --csv \
              contratos_jgm.csv contratos_sgp.csv contratos_presidencia.csv \
              && break
            echo "Fallo intento $i, esperando 120s..."
            sleep 120
          done
          echo "Scraper de detalle finalizado"

      - name: Commit y push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contratos_detalle.csv
          if git diff --staged --quiet; then
            echo "Sin cambios que commitear"
          else
            git commit -m "chore: detalle contratos JGM/SGP/Presidencia [$(date -u '+%Y-%m-%d')]"
            # Traer cambios remotos (otro workflow pudo pushear) antes de subir
            git pull --rebase origin main || git rebase --abort
            git push
          fi
