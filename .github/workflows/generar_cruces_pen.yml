name: Generador de Cruces PEN

on:
  schedule:
    - cron: "0 5 * * *"   # 02:00 ART = 05:00 UTC
  workflow_dispatch:

jobs:
  generar-cruces:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout jefatura_gabinete (principal)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: jgm

      - name: Checkout monitor_contratos_v2
        uses: actions/checkout@v4
        with:
          repository: Viny2030/monitor_contratos_v2
          ref: feature/base-datos
          path: monitor

      - name: Checkout gob_bo_comprar_tgn
        uses: actions/checkout@v4
        with:
          repository: Viny2030/gob_bo_comprar_tgn
          path: tgn

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: jgm/requirements.txt

      - name: Instalar dependencias
        run: pip install pandas openpyxl

      - name: Debug rutas
        run: |
          echo "=== monitor/data ==="
          ls monitor/data/ || echo "NO EXISTE"
          echo "=== tgn/data ==="
          ls tgn/data/ || echo "NO EXISTE"
          echo "=== reporte files monitor ==="
          find monitor/data -name "reporte_*.xlsx" | head -10 || echo "NINGUNO"
          echo "=== reporte files tgn ==="
          find tgn/data -name "reporte_*.xlsx" | head -10 || echo "NINGUNO"

      - name: Generar cruces
        run: |
          cd jgm
          python scripts/generar_cruces_pen.py

      - name: Verificar output
        run: |
          cd jgm
          python - << 'PYEOF'
          import json
          with open('src/frontend/data/cruces.json') as f:
              d = json.load(f)
          print(f'Total cruces: {d["total"]}')
          print(f'ALTO: {d["altos"]} | MEDIO: {d["medios"]}')
          print(f'Generado: {d["generado_en"]}')
          PYEOF

      - name: Commit y push cruces.json
        run: |
          cd jgm
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config advice.addIgnoredFile false
          git add -f src/frontend/data/cruces.json
          git diff --staged --quiet || git commit -m "chore: cruces PEN actualizados [$(date -u '+%Y-%m-%d')]"
          git push