name: Monitor Diario PEN

on:
  schedule:
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout jefatura_gabinete
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout monitor_contratos_v2
        uses: actions/checkout@v4
        with:
          repository: Viny2030/monitor_contratos_v2
          ref: feature/base-datos
          path: monitor_contratos_v2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 openpyxl lxml pdfminer.six holidays

      - name: Capturar fecha
        id: fecha
        run: echo "fecha=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Reclasificar contratos PEN
        run: |
          python scripts/reclasificar_pen.py \
            --repo monitor_contratos_v2 \
            --todo
        continue-on-error: true

      - name: Scraper nomina APN
        run: python scripts/scraper_nomina.py
        continue-on-error: true

      - name: Generar JSONs
        run: python scripts/generar_json.py

      - name: Cruces CUIL vs CUIT
        run: python scripts/cruzar_cuil_cuit.py
        continue-on-error: true

      - name: Commit datos actualizados
        run: |
          git config --global user.name  'Robot Monitor PEN'
          git config --global user.email 'robot@noreply.github.com'
          git add -f src/frontend/data/ || true
          git add -f data/adjudicaciones_*.csv || true
          git add -f data/cruces.json || true
          git add -f data/mapeos_organismos.csv || true
          git diff --staged --quiet \
            && echo "Sin cambios nuevos" \
            && exit 0
          git commit -m "Monitor PEN ${{ steps.fecha.outputs.fecha }} - datos actualizados"
          git push origin HEAD:main

      - name: Actualizar PostgreSQL en Railway
        run: |
          curl -s -X POST https://jefaturagabinete-production.up.railway.app/api/refresh \
               -H "X-Refresh-Token: ${{ secrets.REFRESH_TOKEN }}" \
               --max-time 120 | tee /tmp/refresh_result.json
          cat /tmp/refresh_result.json
        continue-on-error: true

      - name: Notificar exito
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          to: viny01958@gmail.com
          from: Monitor PEN <${{ secrets.MAIL_USER }}>
          subject: "Monitor PEN OK - ${{ steps.fecha.outputs.fecha }}"
          body: |
            El pipeline diario del Monitor de Transparencia PEN se ejecuto correctamente.

            Ver run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Notificar fallo
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          to: viny01958@gmail.com
          from: Monitor PEN <${{ secrets.MAIL_USER }}>
          subject: "Monitor PEN FALLO - ${{ steps.fecha.outputs.fecha }}"
          body: |
            El pipeline diario fallo y requiere revision.

            Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Causas comunes:
            - monitor_contratos_v2 no tiene reportes nuevos
            - BORA / MapaDelEstado no respondieron
            - Error en scripts de reclasificacion
