name: Monitor Diario PEN

on:
  schedule:
    - cron: '0 12 * * 1-5'  # 09:00 Argentina (UTC-3), lunes a viernes
  workflow_dispatch:          # ejecuci脙鲁n manual desde GitHub

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:

      # 芒聰聙芒聰聙 1. Checkout 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Checkout jefatura_gabinete1
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 芒聰聙芒聰聙 2. Checkout monitor_contratos_v2 como repo hermano 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Checkout monitor_contratos_v2
        uses: actions/checkout@v4
        with:
          repository: Viny2030/monitor_contratos_v2
          ref: feature/base-datos
          path: monitor_contratos_v2
          token: ${{ secrets.GITHUB_TOKEN }}

      # 芒聰聙芒聰聙 3. Python 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 芒聰聙芒聰聙 4. Dependencias 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 openpyxl lxml pdfminer.six holidays

      # 芒聰聙芒聰聙 5. Capturar fecha 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Capturar fecha
        id: fecha
        run: echo "fecha=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      # 芒聰聙芒聰聙 6. Reclasificar reportes de monitor_contratos_v2 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Reclasificar contratos PEN
        run: |
          python scripts/reclasificar_pen.py \
            --repo monitor_contratos_v2 \
            --todo
        continue-on-error: true

      # 芒聰聙芒聰聙 7. Actualizar n脙鲁mina 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Scraper n脙鲁mina APN
        run: python scripts/scraper_nomina.py
        continue-on-error: true

      # 芒聰聙芒聰聙 8. Generar JSONs para dashboards 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Generar JSONs
        run: python scripts/generar_json.py

      # 芒聰聙芒聰聙 9. Motor de cruces CUIL vs CUIT 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Cruces CUIL vs CUIT
        run: python scripts/cruzar_cuil_cuit.py
        continue-on-error: true

      # 芒聰聙芒聰聙 10. Commit y push 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Commit datos actualizados
        run: |
          git config --global user.name  'Robot Monitor PEN'
          git config --global user.email 'robot@noreply.github.com'
          git add -f src/frontend/data/ || true
          git add -f data/adjudicaciones_*.csv || true
          git add -f data/cruces.json || true
          git add -f data/mapeos_organismos.csv || true
          git diff --staged --quiet \
            && echo "Sin cambios nuevos" \
            && exit 0
          git commit -m "Monitor PEN ${{ steps.fecha.outputs.fecha }} 芒聙聰 datos actualizados"
          git push origin HEAD:main

      # 芒聰聙芒聰聙 11. Trigger Railway 芒聙聰 guardar snapshot en PostgreSQL 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Actualizar PostgreSQL en Railway
        run: |
          curl -s -X POST https://jefaturagabinete-production.up.railway.app/api/refresh \
               -H "X-Refresh-Token: ${{ secrets.REFRESH_TOKEN }}" \
               --max-time 120 | tee /tmp/refresh_result.json
          cat /tmp/refresh_result.json
        continue-on-error: true

      # 芒聰聙芒聰聙 12. Notificaci脙鲁n 脙漏xito 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Notificar 脙漏xito
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          to: viny01958@gmail.com
          from: Monitor PEN <${{ secrets.MAIL_USER }}>
          subject: "芒聹聟 Monitor PEN OK 芒聙聰 ${{ steps.fecha.outputs.fecha }}"
          body: |
            El pipeline diario del Monitor de Transparencia PEN se ejecut脙鲁 correctamente.

            冒聼聰聴 Ver run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # 芒聰聙芒聰聙 13. Notificaci脙鲁n fallo 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Notificar fallo
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          to: viny01958@gmail.com
          from: Monitor PEN <${{ secrets.MAIL_USER }}>
          subject: "芒聺聦 Monitor PEN FALL脙聯 芒聙聰 ${{ steps.fecha.outputs.fecha }}"
          body: |
            芒職聽茂赂聫 El pipeline diario fall脙鲁 y requiere revisi脙鲁n.

            冒聼聰聴 Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Causas comunes:
            - monitor_contratos_v2 no tiene reportes nuevos
            - BORA / MapaDelEstado no respondieron
            - Error en scripts de reclasificaci脙鲁n
