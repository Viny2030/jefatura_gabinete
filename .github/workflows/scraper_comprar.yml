name: Scraper comprar.gob.ar — JGM

on:
  schedule:
    - cron: "0 6 * * 1,4"   # lunes y jueves a las 06:00 UTC (03:00 ART)
  workflow_dispatch:          # también se puede correr manualmente desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: jgm_anticorrupcion
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 lxml psycopg2-binary python-dotenv

      - name: Correr scraper
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/jgm_anticorrupcion
        run: python scripts/scraper_comprar.py --db --csv

      - name: Mover CSV a src/frontend/data
        run: |
          cp contratos_jgm.csv src/frontend/data/contratos_jgm.csv

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contratos_jgm.csv src/frontend/data/contratos_jgm.csv
          # Solo commitea si hay cambios reales
          git diff --staged --quiet || git commit -m "chore: actualizar contratos JGM [$(date -u '+%Y-%m-%d')]"
          git push
