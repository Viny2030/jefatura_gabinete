name: Scraper Contratos JGM — comprar.gob.ar
on:
  schedule:
    - cron: "0 6 * * 1,4"
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Correr scraper (JGM + SGP + Presidencia)
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: |
          for i in 1 2 3; do
            echo "Intento $i de 3..."
            python scripts/scraper_comprar.py --db --csv --area all && break
            echo "Falló intento $i, esperando 60s..."
            sleep 60
          done
          echo "Scraper finalizado (con o sin datos)"
      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contratos_jgm.csv contratos_sgp.csv contratos_presidencia.csv
          if git diff --staged --quiet; then
            echo "Sin cambios que commitear"
          else
            git commit -m "chore: actualizar contratos JGM/SGP/Presidencia [$(date -u '+%Y-%m-%d')]"
            git pull --rebase origin main || git rebase --abort
            git push
          fi
