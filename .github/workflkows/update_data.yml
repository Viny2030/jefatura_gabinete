name: Pipeline Anticorrupción JGM

on:
  schedule:
    # Diario 7:00 ART (10:00 UTC) — BORA + TGN
    - cron: "0 10 * * *"
    # Semanal lunes 6:00 ART — pipeline completo con COMPRAR
    - cron: "0 9 * * 1"

  workflow_dispatch:
    inputs:
      step:
        description: "Step a correr (vacío = completo)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - bora
          - comprar
          - tgn
          - motor
          - ingesta

jobs:
  pipeline:
    name: Scraping → Motor → Commit
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crear directorio data/
        run: mkdir -p data

      - name: Correr pipeline
        run: |
          cd src
          if [ -n "${{ github.event.inputs.step }}" ]; then
            echo "Corriendo step: ${{ github.event.inputs.step }}"
            python pipeline.py --step ${{ github.event.inputs.step }}
          elif [ "$(date +%u)" = "1" ]; then
            echo "Lunes: pipeline completo (BORA + COMPRAR + TGN + Motor)"
            python pipeline.py
          else
            echo "Diario: BORA + TGN + Motor"
            python pipeline.py --step bora
            python pipeline.py --step tgn
            python pipeline.py --step motor
          fi
        env:
          PYTHONUNBUFFERED: "1"

      - name: Verificar JSON generado
        run: |
          if [ ! -f data/inteligencia.json ]; then
            echo "WARN: inteligencia.json no generado (puede ser step parcial)"
          else
            python -c "
          import json
          with open('data/inteligencia.json') as f:
              d = json.load(f)
          meta = d.get('meta', {})
          print(f'OK: {meta.get(\"total_alertas\", 0)} alertas ({meta.get(\"alertas_alta\", 0)} ALTA)')
            "
          fi

      - name: Commit datos actualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          if git diff --staged --quiet; then
            echo "Sin cambios en los datos"
          else
            FECHA=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "data: actualizacion automatica $FECHA [skip ci]"
            git push
          fi

      - name: Resumen del pipeline
        if: always()
        run: |
          echo "### Resultado del pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/resumen.json ]; then
            python -c "
          import json
          with open('data/resumen.json') as f:
              d = json.load(f)
          kpis = d.get('kpis', {})
          print(f'- **Alertas totales**: {kpis.get(\"total_alertas\", 0)}')
          print(f'- **Alertas ALTA**: {kpis.get(\"alertas_alta\", 0)}')
          print(f'- **Alertas MEDIA**: {kpis.get(\"alertas_media\", 0)}')
          print(f'- **Vínculos familiares detectados**: {kpis.get(\"vinculos_familiares\", 0)}')
          print(f'- **Vínculos comerciales detectados**: {kpis.get(\"vinculos_comerciales\", 0)}')
          print(f'- **Actualizado**: {d.get(\"ultima_actualizacion\", \"—\")}')
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "- Pipeline parcial — resumen no disponible" >> $GITHUB_STEP_SUMMARY
          fi
